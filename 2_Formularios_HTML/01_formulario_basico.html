<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario HTML - Ejemplo</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Formulario de Registro</h1>
    <p>Complete este formulario para registrarse en nuestra plataforma.</p>
    
    <form action="/registrar" method="POST">
        
        <!-- Campos de Texto -->
        <div class="form-group">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Ingrese su nombre">
        </div>
        
        <!-- Email -->
        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
        </div>
        
        <!-- Teléfono -->
        <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+34 123456789">
        </div>
        
        <!-- Contraseña -->
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="Mínimo 8 caracteres">
        </div>
        
        <!-- Confirmar Contraseña -->
        <div class="form-group">
            <label for="confirm-password">Confirmar Contraseña:</label>
            <input type="password" id="confirm-password" name="confirm-password" required minlength="8">
        </div>
        
        <!-- Género (Radio Buttons) -->
        <div class="form-group">
            <label>Género:</label>
            <input type="radio" name="genero" value="masculino" id="masculino">
            <label for="masculino" style="display: inline; margin-right: 15px;">Masculino</label>
            
            <input type="radio" name="genero" value="femenino" id="femenino">
            <label for="femenino" style="display: inline; margin-right: 15px;">Femenino</label>
            
            <input type="radio" name="genero" value="otro" id="otro">
            <label for="otro" style="display: inline;">Otro</label>
        </div>
        
        <!-- País (Select) -->
        <div class="form-group">
            <label for="pais">País:</label>
            <select id="pais" name="pais" required>
                <option value="">-- Seleccione un país --</option>
                <option value="españa">España</option>
                <option value="mexico">México</option>
                <option value="argentina">Argentina</option>
                <option value="colombia">Colombia</option>
                <option value="otro">Otro</option>
            </select>
        </div>
        
        <!-- Intereses (Checkboxes) -->
        <div class="form-group">
            <label>Intereses:</label>
            <input type="checkbox" name="intereses" value="deportes" id="deportes">
            <label for="deportes" style="display: inline; margin-right: 15px;">Deportes</label>
            
            <input type="checkbox" name="intereses" value="musica" id="musica">
            <label for="musica" style="display: inline; margin-right: 15px;">Música</label>
            
            <input type="checkbox" name="intereses" value="tecnologia" id="tecnologia">
            <label for="tecnologia" style="display: inline; margin-right: 15px;">Tecnología</label>
            
            <input type="checkbox" name="intereses" value="viajes" id="viajes">
            <label for="viajes" style="display: inline;">Viajes</label>
        </div>
        
        <!-- Comentarios -->
        <div class="form-group">
            <label for="comentarios">Comentarios:</label>
            <textarea id="comentarios" name="comentarios" rows="4" placeholder="Escriba sus comentarios aquí..."></textarea>
        </div>
        
        <!-- Términos y Condiciones -->
        <div class="form-group">
            <input type="checkbox" name="terminos" id="terminos" required>
            <label for="terminos" style="display: inline;">Acepto los términos y condiciones</label>
        </div>
        
        <!-- Botones -->
        <div class="form-group">
            <button type="submit">Registrarse</button>
            <button type="reset" style="background-color: #6c757d; margin-left: 10px;">Limpiar Formulario</button>
        </div>
    </form>
    
    <footer style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #ccc;">
        <p>&copy; 2026 - Formularios HTML | Bertha46</p>
    </footer>
</body>
</html>
